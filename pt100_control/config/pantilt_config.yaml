# ros2_control controller manager and joint limits for the PT100 pan-tilt.
# Configures ForwardCommandController (position interface), JointStateBroadcaster, and JointSaturationLimiter.
controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    statistics_publish_rate: 0.0
    enforce_command_limits: true
    handle_exceptions: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    pantilt_controller:
      type: forward_command_controller/ForwardCommandController

    joint_limits:
      pan_joint:
        has_position_limits: true
        min_position: -1.5708    # rad — matches pantilt.control.xacro pan_joint_lower
        max_position: 1.5708     # rad — matches pantilt.control.xacro pan_joint_upper
        has_velocity_limits: false
      tilt_joint:
        has_position_limits: true
        min_position: -1.5708  # rad — -π/2, matches pantilt.control.xacro tilt_joint_lower
        max_position: 1.5708   # rad — +π/2, matches pantilt.control.xacro tilt_joint_upper
        has_velocity_limits: false

joint_state_broadcaster:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint
    # No `interfaces` needed: JSB publishes position/velocity/effort to /joint_states
    # and extra state interfaces (voltage, temperature, etc.) to /dynamic_joint_states.

pantilt_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint
    interface_name: position
