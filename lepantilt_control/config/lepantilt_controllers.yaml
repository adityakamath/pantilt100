controller_manager:
  ros__parameters:
    update_rate: 50  # Hz
    statistics_publish_rate: 0.0
    enforce_command_limits: true
    handle_exceptions: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    lepantilt_controller:
      type: forward_command_controller/ForwardCommandController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint
    interfaces:
      - position
      - velocity
      - effort
      - voltage
      - temperature
      - current
      - is_moving

lepantilt_controller:
  ros__parameters:
    joints:
      - pan_joint
      - tilt_joint
    interface_name: position
