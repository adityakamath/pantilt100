/oak:
  ros__parameters:
    driver:
      i_usb_speed: SUPER
    pipeline_gen:
      i_nn_type: none
      i_pipeline_type: STEREO
      i_enable_imu: true
    left:
      i_fps: 30.0
      i_resolution: THE_400_P
      i_publish_topic: true
    right:
      i_fps: 30.0
      i_resolution: THE_400_P
      i_publish_topic: true
    imu:
      i_acc_freq: 200
      i_gyro_freq: 200
      i_max_batch_reports: 1
      i_batch_report_threshold: 1
    rgb:
      i_publish_topic: false
    stereo:
      i_publish_left_rect: false
      i_publish_right_rect: false
      i_publish_synced_rect_pair: false
      i_publish_topic: false
